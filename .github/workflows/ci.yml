name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install ruff black
          ruff check . || true
          black --check . || true

  test-py:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: flowdeck_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - working-directory: apps/api
        run: |
          python -m pip install --upgrade pip
          pip install -e . || pip install .
          pip install pytest pytest-asyncio
      - working-directory: apps/api
        env:
          DATABASE_URL: "postgresql+psycopg://postgres:postgres@localhost:5432/flowdeck_test"
        run: pytest -q

  typecheck-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: apps/web
        run: npm ci || npm install
      - working-directory: apps/web
        run: npx tsc -b --noEmit

  test-web:
    runs-on: ubuntu-latest
    needs: typecheck-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: apps/web
        run: npm ci || npm install
      - working-directory: apps/web
        run: npx vitest run || npm test || echo "no vitest"

  build-web:
    runs-on: ubuntu-latest
    needs: typecheck-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - working-directory: apps/web
        run: npm ci || npm install
      - working-directory: apps/web
        run: npm run build
